  <rect x="100" y="1245" width="40" height="20" rx="4" fill="#14b8a6" opacity="0.3"/>
  <rect x="250" y="1245" width="40" height="20" rx="4" fill="#334155"/>
  <rect x="400" y="1245" width="40" height="20" rx="4" fill="#334155"/>
  <rect x="550" y="1245" width="40" height="20" rx="4" fill="#334155"/>
