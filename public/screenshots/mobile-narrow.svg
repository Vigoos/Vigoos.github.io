  </defs>
  <rect width="720" height="1280" fill="url(#bg)"/>
  <!-- Status bar -->
  <rect x="0" y="0" width="720" height="44" fill="#1e293b"/>
  <circle cx="600" cy="22" r="3" fill="#14b8a6"/>
