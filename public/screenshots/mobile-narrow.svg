  <!-- Feature card 1 -->
  <rect x="32" y="620" width="656" height="180" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="62" y="648" width="48" height="48" rx="12" fill="url(#accent)" opacity="0.8"/>
  <rect x="62" y="710" width="250" height="10" rx="4" fill="#475569"/>
  <rect x="62" y="730" width="580" height="8" rx="4" fill="#334155"/>
  <rect x="62" y="748" width="500" height="8" rx="4" fill="#334155"/>
  <!-- Feature card 2 -->
  <rect x="32" y="820" width="656" height="180" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="62" y="848" width="48" height="48" rx="12" fill="url(#accent)" opacity="0.8"/>
  <rect x="62" y="910" width="250" height="10" rx="4" fill="#475569"/>
  <rect x="62" y="930" width="580" height="8" rx="4" fill="#334155"/>
  <rect x="62" y="948" width="500" height="8" rx="4" fill="#334155"/>
  <!-- Feature card 3 -->
  <rect x="32" y="1020" width="656" height="180" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="62" y="1048" width="48" height="48" rx="12" fill="url(#accent)" opacity="0.8"/>
  <rect x="62" y="1110" width="250" height="10" rx="4" fill="#475569"/>
  <rect x="62" y="1130" width="580" height="8" rx="4" fill="#334155"/>
  <rect x="62" y="1148" width="500" height="8" rx="4" fill="#334155"/>
