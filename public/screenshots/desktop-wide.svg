<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Top bar mockup -->
  <rect x="0" y="0" width="1280" height="64" fill="#1e293b" opacity="0.8"/>
  <rect x="0" y="64" width="1280" height="1" fill="#334155" opacity="0.5"/>
  <!-- Logo area -->
  <rect x="32" y="14" width="36" height="36" rx="10" fill="url(#accent)"/>
  <text x="50" y="37" font-family="system-ui" font-size="16" font-weight="900" fill="#fff" text-anchor="middle">B</text>
  <text x="80" y="37" font-family="system-ui" font-size="18" font-weight="900" fill="#fff">BIADOXID</text>
  <!-- Navigation items -->
  <rect x="420" y="24" width="60" height="18" rx="4" fill="#334155"/>
  <rect x="500" y="24" width="80" height="18" rx="4" fill="#334155"/>
  <rect x="600" y="24" width="100" height="18" rx="4" fill="#334155"/>
  <rect x="720" y="24" width="90" height="18" rx="4" fill="#334155"/>
  <!-- Contact button -->
  <rect x="1100" y="18" width="130" height="30" rx="15" fill="url(#accent)"/>
  <!-- Hero section -->
  <rect x="80" y="120" width="500" height="16" rx="8" fill="#475569"/>
  <rect x="80" y="150" width="650" height="16" rx="8" fill="#475569"/>
  <rect x="80" y="180" width="450" height="16" rx="8" fill="#475569"/>
  <rect x="80" y="220" width="380" height="40" rx="12" fill="url(#accent)"/>
  <!-- Hero image placeholder -->
  <rect x="750" y="100" width="450" height="300" rx="24" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <!-- Feature cards -->
  <rect x="80" y="420" width="350" height="200" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="465" y="420" width="350" height="200" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="850" y="420" width="350" height="200" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Card content -->
  <rect x="110" y="450" width="50" height="50" rx="12" fill="url(#accent)" opacity="0.8"/>
  <rect x="110" y="515" width="200" height="10" rx="4" fill="#475569"/>
  <rect x="110" y="535" width="280" height="8" rx="4" fill="#334155"/>
  <rect x="110" y="555" width="240" height="8" rx="4" fill="#334155"/>
  <!-- Bottom footer mockup -->
  <rect x="0" y="660" width="1280" height="60" fill="#0f172a"/>
  <line x1="0" y1="660" x2="1280" y2="660" stroke="#334155" stroke-width="1" opacity="0.5"/>
  <!-- Status bar -->
  <rect x="1160" y="2" width="100" height="20" rx="4" fill="#14b8a6" opacity="0.3"/>
  <circle cx="1170" cy="12" r="3" fill="#14b8a6"/>
  <text x="1180" y="15" font-family="system-ui" font-size="8" fill="#14b8a6" opacity="0.8">PWA Activa</text>
</svg>
