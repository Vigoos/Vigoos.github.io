<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>
  <!-- Fondo degradado -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Cápsula / píldora estilizada -->
  <g transform="translate(256,256)">
    <rect x="-80" y="-40" width="160" height="80" rx="40" fill="url(#pill)" opacity="0.95"/>
    <rect x="-80" y="-40" width="80" height="80" rx="40" fill="#ffffff" opacity="0.5"/>
  </g>
  <!-- Inicial "B" dentro de la cápsula -->
  <text x="256" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="900" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">B</text>
</svg>
